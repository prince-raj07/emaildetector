<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishShield Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard">
      <!-- Watermark Effect -->
  <img src="icons/phishshield-logo.png" alt="" class="watermark">
    <!-- Header -->
    <header class="dash-header">
      <div class="logo-container">
        <img src="icons/phishshield-logo.png" alt="PhishShield" class="logo">
        <h1>PhishShield</h1>
      </div>
      <button onclick="window.close()" class="close-btn">✕</button>
    </header>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalScans">0</div>
        <div class="stat-label">Total Scans</div>
      </div>
      <div class="stat-card phishing">
        <div class="stat-number" id="phishingCount">0</div>
        <div class="stat-label">Phishing Detected</div>
      </div>
      <div class="stat-card safe">
        <div class="stat-number" id="safeCount">0</div>
        <div class="stat-label">Safe Emails</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="avgScore">0.0</div>
        <div class="stat-label">Avg Risk Score</div>
      </div>
    </div>

    <!-- History -->
    <div class="history-section">
      <div class="section-header">
        <h2>Scan History</h2>
        <button onclick="clearHistory()" class="clear-btn">Clear All</button>
      </div>
      <table id="historyTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Subject</th>
            <th>Risk Level</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>

    <div class="footer">
      PhishShield v1.1 • Powered by RAG + Agentic AI
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
